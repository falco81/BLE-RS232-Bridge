<svg viewBox="0 0 1060 500" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">

  <!-- Background -->
  <rect width="1060" height="500" fill="#1e1e2e" rx="12"/>

  <!-- Title -->
  <text x="530" y="35" fill="#eee" font-size="16" font-weight="bold" text-anchor="middle">BLE → RS-232 Serial Mouse Bridge — Wiring Diagram</text>

  <!-- ══════════════════════════════════════════════
       ESP32-WROOM-32
  ══════════════════════════════════════════════ -->
  <rect x="20" y="60" width="175" height="380" rx="8" fill="#1a3a1a" stroke="#78d878" stroke-width="2"/>
  <text x="108" y="84" fill="#78d878" font-size="13" font-weight="bold" text-anchor="middle">ESP32-WROOM-32</text>

  <!-- Pin: 3V3 -->
  <rect x="155" y="100" width="40" height="22" rx="3" fill="#1a3a1a" stroke="#4a9eff" stroke-width="1"/>
  <text x="175" y="115" fill="#4a9eff" font-size="11" text-anchor="middle">3V3</text>
  <text x="90" y="115" fill="#4a9eff" font-size="11" text-anchor="middle">3.3V ref</text>

  <!-- Pin: VIN -->
  <rect x="155" y="132" width="40" height="22" rx="3" fill="#1a3a1a" stroke="#ff9944" stroke-width="1"/>
  <text x="175" y="147" fill="#ff9944" font-size="11" text-anchor="middle">VIN</text>
  <text x="90" y="147" fill="#ff9944" font-size="11" text-anchor="middle">5V in</text>

  <!-- Pin: GND -->
  <rect x="155" y="164" width="40" height="22" rx="3" fill="#1a3a1a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="175" y="179" fill="#ff6b6b" font-size="11" text-anchor="middle">GND</text>

  <!-- Pin: GPIO16 TX -->
  <rect x="155" y="220" width="40" height="22" rx="3" fill="#1a3a1a" stroke="#a0e878" stroke-width="1"/>
  <text x="175" y="235" fill="#a0e878" font-size="11" text-anchor="middle">IO16</text>
  <text x="90" y="235" fill="#a0e878" font-size="11" text-anchor="middle">TX out</text>

  <!-- Pin: GPIO23 RTS -->
  <rect x="155" y="270" width="40" height="22" rx="3" fill="#1a3a1a" stroke="#ffd700" stroke-width="1"/>
  <text x="175" y="285" fill="#ffd700" font-size="11" text-anchor="middle">IO23</text>
  <text x="90" y="285" fill="#ffd700" font-size="11" text-anchor="middle">RTS in</text>

  <!-- Pin: GPIO5 DTR -->
  <rect x="155" y="320" width="40" height="22" rx="3" fill="#1a3a1a" stroke="#ff88cc" stroke-width="1"/>
  <text x="175" y="335" fill="#ff88cc" font-size="11" text-anchor="middle">IO5</text>
  <text x="90" y="335" fill="#ff88cc" font-size="11" text-anchor="middle">DTR in</text>

  <!-- ══════════════════════════════════════════════
       Level Shifter BSS138
  ══════════════════════════════════════════════ -->
  <rect x="280" y="60" width="210" height="380" rx="8" fill="#2a2a2a" stroke="#ffd700" stroke-width="2"/>
  <text x="385" y="84" fill="#ffd700" font-size="13" font-weight="bold" text-anchor="middle">BSS138 Level Shifter</text>
  <text x="385" y="100" fill="#aaa" font-size="10" text-anchor="middle">3.3V ↔ 5V bidirectional</text>

  <!-- LV side label -->
  <text x="305" y="128" fill="#78d878" font-size="11">LV side</text>

  <!-- LV pins -->
  <rect x="290" y="135" width="40" height="22" rx="3" fill="#222" stroke="#4a9eff" stroke-width="1"/>
  <text x="310" y="150" fill="#4a9eff" font-size="11" text-anchor="middle">LV</text>

  <rect x="290" y="164" width="40" height="22" rx="3" fill="#222" stroke="#ff6b6b" stroke-width="1"/>
  <text x="310" y="179" fill="#ff6b6b" font-size="11" text-anchor="middle">GND</text>
  <line x1="310" y1="186" x2="450" y2="186" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="380" y="199" fill="#ff6b6b" font-size="9" text-anchor="middle">internally connected</text>

  <rect x="290" y="212" width="40" height="22" rx="3" fill="#222" stroke="#a0e878" stroke-width="1"/>
  <text x="310" y="227" fill="#a0e878" font-size="11" text-anchor="middle">A1</text>

  <rect x="290" y="262" width="40" height="22" rx="3" fill="#222" stroke="#ffd700" stroke-width="1"/>
  <text x="310" y="277" fill="#ffd700" font-size="11" text-anchor="middle">A2</text>

  <rect x="290" y="312" width="40" height="22" rx="3" fill="#222" stroke="#ff88cc" stroke-width="1"/>
  <text x="310" y="327" fill="#ff88cc" font-size="11" text-anchor="middle">A3</text>

  <!-- HV side label -->
  <text x="420" y="128" fill="#ff9944" font-size="11">HV side</text>

  <!-- HV pins -->
  <rect x="430" y="135" width="40" height="22" rx="3" fill="#222" stroke="#ff9944" stroke-width="1"/>
  <text x="450" y="150" fill="#ff9944" font-size="11" text-anchor="middle">HV</text>

  <rect x="430" y="164" width="40" height="22" rx="3" fill="#222" stroke="#ff6b6b" stroke-width="1"/>
  <text x="450" y="179" fill="#ff6b6b" font-size="11" text-anchor="middle">GND</text>

  <rect x="430" y="212" width="40" height="22" rx="3" fill="#222" stroke="#a0e878" stroke-width="1"/>
  <text x="450" y="227" fill="#a0e878" font-size="11" text-anchor="middle">B1</text>

  <rect x="430" y="262" width="40" height="22" rx="3" fill="#222" stroke="#ffd700" stroke-width="1"/>
  <text x="450" y="277" fill="#ffd700" font-size="11" text-anchor="middle">B2</text>

  <rect x="430" y="312" width="40" height="22" rx="3" fill="#222" stroke="#ff88cc" stroke-width="1"/>
  <text x="450" y="327" fill="#ff88cc" font-size="11" text-anchor="middle">B3</text>

  <!-- ══════════════════════════════════════════════
       MAX232CPE
  ══════════════════════════════════════════════ -->
  <rect x="570" y="60" width="210" height="380" rx="8" fill="#2a1a1a" stroke="#ff9944" stroke-width="2"/>
  <text x="675" y="84" fill="#ff9944" font-size="13" font-weight="bold" text-anchor="middle">MAX232CPE</text>
  <text x="675" y="100" fill="#aaa" font-size="10" text-anchor="middle">TTL ↔ RS-232  (4× 1µF caps)</text>

  <!-- TTL side label -->
  <text x="595" y="128" fill="#78d878" font-size="11">TTL side (5V)</text>

  <!-- TTL pins -->
  <rect x="580" y="135" width="50" height="22" rx="3" fill="#2a1a1a" stroke="#ff9944" stroke-width="1"/>
  <text x="605" y="150" fill="#ff9944" font-size="11" text-anchor="middle">VCC</text>

  <rect x="580" y="164" width="50" height="22" rx="3" fill="#2a1a1a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="605" y="179" fill="#ff6b6b" font-size="11" text-anchor="middle">GND</text>

  <rect x="580" y="212" width="50" height="22" rx="3" fill="#2a1a1a" stroke="#a0e878" stroke-width="1"/>
  <text x="605" y="227" fill="#a0e878" font-size="11" text-anchor="middle">T1IN</text>

  <rect x="580" y="262" width="50" height="22" rx="3" fill="#2a1a1a" stroke="#ffd700" stroke-width="1"/>
  <text x="605" y="277" fill="#ffd700" font-size="11" text-anchor="middle">R1OUT</text>

  <rect x="580" y="312" width="50" height="22" rx="3" fill="#2a1a1a" stroke="#ff88cc" stroke-width="1"/>
  <text x="605" y="327" fill="#ff88cc" font-size="11" text-anchor="middle">R2OUT</text>

  <!-- RS-232 side label -->
  <text x="700" y="128" fill="#cc88ff" font-size="11">RS-232 side</text>

  <!-- RS-232 pins -->
  <rect x="720" y="135" width="50" height="22" rx="3" fill="#2a1a1a" stroke="#ff9944" stroke-width="1"/>
  <text x="745" y="150" fill="#ff9944" font-size="11" text-anchor="middle">V+/V-</text>

  <rect x="720" y="212" width="50" height="22" rx="3" fill="#2a1a1a" stroke="#a0e878" stroke-width="1"/>
  <text x="745" y="227" fill="#a0e878" font-size="11" text-anchor="middle">T1OUT</text>

  <rect x="720" y="262" width="50" height="22" rx="3" fill="#2a1a1a" stroke="#ffd700" stroke-width="1"/>
  <text x="745" y="277" fill="#ffd700" font-size="11" text-anchor="middle">R1IN</text>

  <rect x="720" y="312" width="50" height="22" rx="3" fill="#2a1a1a" stroke="#ff88cc" stroke-width="1"/>
  <text x="745" y="327" fill="#ff88cc" font-size="11" text-anchor="middle">R2IN</text>

  <text x="675" y="390" fill="#888" font-size="10" text-anchor="middle">C1–C4: 1µF electrolytic</text>
  <text x="675" y="405" fill="#888" font-size="10" text-anchor="middle">between charge pump pins</text>

  <!-- ══════════════════════════════════════════════
       DB9 Female connector
  ══════════════════════════════════════════════ -->
  <rect x="855" y="60" width="185" height="380" rx="8" fill="#2a2a4a" stroke="#cc88ff" stroke-width="2"/>
  <text x="948" y="84" fill="#cc88ff" font-size="13" font-weight="bold" text-anchor="middle">DB9 Female</text>
  <text x="948" y="100" fill="#aaa" font-size="10" text-anchor="middle">COM port on PC</text>

  <rect x="865" y="135" width="50" height="22" rx="3" fill="#2a2a4a" stroke="#888" stroke-width="1"/>
  <text x="890" y="150" fill="#888" font-size="11" text-anchor="middle">pin 1</text>
  <text x="940" y="150" fill="#888" font-size="10">DCD — NC</text>

  <rect x="865" y="212" width="50" height="22" rx="3" fill="#2a2a4a" stroke="#a0e878" stroke-width="1"/>
  <text x="890" y="227" fill="#a0e878" font-size="11" text-anchor="middle">pin 2</text>
  <text x="940" y="227" fill="#a0e878" font-size="10">RD (data in)</text>

  <rect x="865" y="242" width="50" height="22" rx="3" fill="#2a2a4a" stroke="#888" stroke-width="1"/>
  <text x="890" y="257" fill="#888" font-size="11" text-anchor="middle">pin 3</text>
  <text x="940" y="257" fill="#888" font-size="10">TD — NC</text>

  <rect x="865" y="272" width="50" height="22" rx="3" fill="#2a2a4a" stroke="#ff88cc" stroke-width="1"/>
  <text x="890" y="287" fill="#ff88cc" font-size="11" text-anchor="middle">pin 4</text>
  <text x="940" y="287" fill="#ff88cc" font-size="10">DTR (ident)</text>

  <rect x="865" y="302" width="50" height="22" rx="3" fill="#2a2a4a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="890" y="317" fill="#ff6b6b" font-size="11" text-anchor="middle">pin 5</text>
  <text x="940" y="317" fill="#ff6b6b" font-size="10">GND</text>

  <rect x="865" y="332" width="50" height="22" rx="3" fill="#2a2a4a" stroke="#888" stroke-width="1"/>
  <text x="890" y="347" fill="#888" font-size="11" text-anchor="middle">pin 6</text>
  <text x="940" y="347" fill="#888" font-size="10">DSR — NC</text>

  <rect x="865" y="362" width="50" height="22" rx="3" fill="#2a2a4a" stroke="#ffd700" stroke-width="1"/>
  <text x="890" y="377" fill="#ffd700" font-size="11" text-anchor="middle">pin 7</text>
  <text x="940" y="377" fill="#ffd700" font-size="10">RTS (ident)</text>

  <!-- ══════════════════════════════════════════════
       WIRES — ESP32 to Level Shifter
  ══════════════════════════════════════════════ -->
  <!-- 3V3 → LV -->
  <line x1="195" y1="111" x2="290" y2="146" stroke="#4a9eff" stroke-width="2"/>
  <!-- VIN → HV (via bottom rail) -->
  <line x1="195" y1="143" x2="230" y2="143" stroke="#ff9944" stroke-width="2"/>
  <line x1="230" y1="143" x2="230" y2="450" stroke="#ff9944" stroke-width="2"/>
  <line x1="230" y1="450" x2="540" y2="450" stroke="#ff9944" stroke-width="2"/>
  <line x1="540" y1="450" x2="540" y2="146" stroke="#ff9944" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="540" y1="146" x2="470" y2="146" stroke="#ff9944" stroke-width="2"/>
  <!-- also to MAX232 VCC -->
  <line x1="530" y1="430" x2="640" y2="430" stroke="#ff9944" stroke-width="2"/>
  <line x1="640" y1="430" x2="640" y2="146" stroke="#ff9944" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="640" y1="146" x2="630" y2="146" stroke="#ff9944" stroke-width="2"/>
  <!-- GND → shared rail -->
  <line x1="195" y1="175" x2="255" y2="175" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="255" y1="175" x2="255" y2="460" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="255" y1="460" x2="660" y2="460" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="660" y1="460" x2="660" y2="175" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="660" y1="175" x2="630" y2="175" stroke="#ff6b6b" stroke-width="2"/>
  <!-- also LS GND -->
  <line x1="310" y1="175" x2="310" y2="460" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4,2" opacity="0.5"/>
  <!-- GPIO16 TX → A1 -->
  <line x1="195" y1="231" x2="290" y2="223" stroke="#a0e878" stroke-width="2"/>
  <!-- GPIO23 RTS → A2 -->
  <line x1="195" y1="281" x2="290" y2="273" stroke="#ffd700" stroke-width="2"/>
  <!-- GPIO5 DTR → A3 -->
  <line x1="195" y1="331" x2="290" y2="323" stroke="#ff88cc" stroke-width="2"/>

  <!-- ══════════════════════════════════════════════
       WIRES — Level Shifter to MAX232
  ══════════════════════════════════════════════ -->
  <!-- B1 → T1IN -->
  <line x1="470" y1="223" x2="580" y2="223" stroke="#a0e878" stroke-width="2"/>
  <!-- B2 → R1OUT -->
  <line x1="470" y1="273" x2="580" y2="273" stroke="#ffd700" stroke-width="2"/>
  <!-- B3 → R2OUT -->
  <line x1="470" y1="323" x2="580" y2="323" stroke="#ff88cc" stroke-width="2"/>

  <!-- ══════════════════════════════════════════════
       WIRES — MAX232 to DB9
  ══════════════════════════════════════════════ -->
  <!-- T1OUT → DB9 pin 2 -->
  <line x1="770" y1="223" x2="865" y2="223" stroke="#a0e878" stroke-width="2"/>
  <!-- R1IN → DB9 pin 7 (RTS) -->
  <line x1="770" y1="273" x2="840" y2="273" stroke="#ffd700" stroke-width="2"/>
  <line x1="840" y1="273" x2="840" y2="383" stroke="#ffd700" stroke-width="2"/>
  <line x1="840" y1="383" x2="865" y2="383" stroke="#ffd700" stroke-width="2"/>
  <!-- R2IN → DB9 pin 4 (DTR) -->
  <line x1="770" y1="323" x2="820" y2="323" stroke="#ff88cc" stroke-width="2"/>
  <line x1="820" y1="323" x2="820" y2="293" stroke="#ff88cc" stroke-width="2"/>
  <line x1="820" y1="293" x2="865" y2="293" stroke="#ff88cc" stroke-width="2"/>
  <!-- GND → DB9 pin 5 -->
  <line x1="660" y1="460" x2="870" y2="460" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="870" y1="460" x2="870" y2="323" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="870" y1="323" x2="865" y2="323" stroke="#ff6b6b" stroke-width="2"/>

  <!-- Footer notes -->
  <text x="530" y="480" fill="#555" font-size="11" text-anchor="middle">GPIO16=TX(out) · GPIO23=RTS(in) · GPIO5=DTR(in) · 1200 baud 7N2 bit-bang</text>
</svg>
